<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MountEdge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='/'">MountEdge</div>
    </header>

    <div class="form-container animate-fade">
        <h2 style="margin-bottom: 2rem; text-align: center;">Join MountEdge</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required placeholder="Min 6 characters">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="/login.html" style="color: var(--primary);">Login here</a>
        </p>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await auth.register(name, email, password);
                alert('Registration successful! Please login.');
                window.location.href = '/login.html';
            } catch (err) {
                alert('Registration failed: ' + (err.message || 'Error'));
            }
        });
    </script>
</body>
</html>
