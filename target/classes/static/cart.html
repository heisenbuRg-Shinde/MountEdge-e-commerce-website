<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | MountEdge</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
        }
        .summary {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: right;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='/'">MountEdge</div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="container animate-fade">
        <h2 style="margin-bottom: 2rem;">Shopping Cart</h2>
        <div id="cart-items">
            <!-- Loaded via JS -->
        </div>
        <div class="summary" id="cart-summary" style="display: none;">
            <h3 id="total-price" style="margin-bottom: 1.5rem;">Total: $0.00</h3>
            <button class="btn btn-primary" onclick="proceedToCheckout()">Checkout</button>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        if (!auth.isAuthenticated()) window.location.href = '/login.html';

        async function loadCart() {
            try {
                const cart = await api.get('/cart');
                const container = document.getElementById('cart-items');
                const summary = document.getElementById('cart-summary');
                
                if (!cart.items || cart.items.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Your cart is empty.</p>';
                    summary.style.display = 'none';
                    return;
                }

                let total = 0;
                container.innerHTML = cart.items.map(item => {
                    const subtotal = item.product.price * item.quantity;
                    total += subtotal;
                    return `
                        <div class="cart-item">
                            <div>
                                <h3 style="margin-bottom: 0.2rem;">${item.product.name}</h3>
                                <p style="color: var(--text-muted)">$${item.product.price} x ${item.quantity}</p>
                            </div>
                            <div style="display:flex; align-items:center; gap: 2rem;">
                                <span style="font-weight: 700;">$${subtotal.toFixed(2)}</span>
                                <button class="btn btn-outline" style="padding: 0.4rem 1rem; color: #ef4444;" onclick="removeFromCart(${item.product.productId})">Remove</button>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('total-price').innerText = `Total: $${total.toFixed(2)}`;
                summary.style.display = 'block';
            } catch (err) {
                console.error(err);
            }
        }

        async function removeFromCart(id) {
            try {
                await api.delete(`/cart/remove/${id}`);
                loadCart();
            } catch (err) {
                alert('Error removing item');
            }
        }

        async function proceedToCheckout() {
            try {
                await api.post('/orders/checkout', { tokenRef: 'T-' + Math.random().toString(36).substr(2, 9).toUpperCase() });
                alert('Order placed successfully!');
                window.location.href = '/orders.html';
            } catch (err) {
                alert('Checkout failed: ' + (err.message || 'Insufficient stock'));
            }
        }

        loadCart();
    </script>
</body>
</html>
