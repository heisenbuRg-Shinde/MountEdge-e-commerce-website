<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | MountEdge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='/'">MountEdge</div>
        <nav><ul><li><a href="/">Home</a></li></ul></nav>
    </header>

    <div class="container animate-fade">
        <h2 style="margin-bottom: 2rem;">My Wishlist</h2>
        <div id="loading" class="loader"></div>
        <div class="grid" id="wishlist-grid"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <h3>Your wishlist is empty</h3>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        if (!auth.isAuthenticated()) window.location.href = '/login.html';

        async function loadWishlist() {
            try {
                const wishlist = await api.get('/wishlist');
                document.getElementById('loading').style.display = 'none';
                
                if (!wishlist.items || wishlist.items.length === 0) {
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }

                document.getElementById('wishlist-grid').innerHTML = wishlist.items.map(p => `
                    <div class="card">
                        <div class="card-content">
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">Rs. ${p.price}</div>
                            <div style="display:flex; gap: 0.5rem; margin-top: 1rem;">
                                <button class="btn btn-primary" style="flex:1" onclick="addToCart(${p.productId})">Add to Cart</button>
                                <button class="btn btn-outline" onclick="remove(${p.productId})">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                utils.showError('Failed to load wishlist');
            }
        }

        async function addToCart(id) {
            try {
                await api.post('/cart/add', { productId: id, quantity: 1 });
                utils.showToast('Added to cart!');
            } catch (err) { utils.showError(err); }
        }

        async function remove(id) {
            try {
                await api.delete(`/wishlist/remove/${id}`);
                loadWishlist();
            } catch (err) { utils.showError(err); }
        }

        loadWishlist();
    </script>
</body>
</html>
