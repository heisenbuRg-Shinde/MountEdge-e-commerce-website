<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | MountEdge</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .order-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 1rem; }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-PLACED { background: #3b82f6; color: white; }
        .status-CONFIRMED { background: #8b5cf6; color: white; }
        .status-SHIPPED { background: #f59e0b; color: white; }
        .status-DELIVERED { background: #10b981; color: white; }
        .status-CANCELLED { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='/'">MountEdge</div>
        <nav><ul><li><a href="/">Home</a></li></ul></nav>
    </header>

    <div class="container animate-fade">
        <h2 style="margin-bottom: 2rem;">My Orders</h2>
        <div id="loading" class="loader"></div>
        <div id="orders-list"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <h3>You have no orders yet.</h3>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        if (!auth.isAuthenticated()) window.location.href = '/login.html';

        async function loadOrders() {
            try {
                const response = await api.get('/orders/my-orders?size=50');
                const orders = response.content || [];
                document.getElementById('loading').style.display = 'none';

                if (orders.length === 0) {
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }

                document.getElementById('orders-list').innerHTML = orders.map(o => {
                    const date = new Date(o.createdAt).toLocaleDateString();
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <div style="color:var(--text-muted); font-size:0.9rem;">Order ID: #${o.orderId}</div>
                                    <div style="font-size:0.9rem;">Placed on ${date}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-weight:bold; font-size:1.2rem;">Rs. ${o.totalAmount.toFixed(2)}</div>
                                    <div class="status-badge status-${o.status}">${o.status}</div>
                                    <button class="btn btn-outline" style="margin-top:0.5rem; padding: 0.4rem 0.8rem; font-size:0.8rem;" onclick="window.location.href='/order-tracking.html?id=${o.orderId}'">Track Order</button>
                                </div>
                            </div>
                            <div>
                                <p>${o.itemCount} item(s)</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                utils.showError('Failed to load orders');
            }
        }

        loadOrders();
    </script>
</body>
</html>
